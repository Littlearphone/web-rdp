<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Web远程控制</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 100vw; height: 100vh; background: #000; color: #ddd; font-family: sans-serif; overflow: hidden; }

  #main { display: flex; flex-direction: column; height: 100%; }
  #view { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #screen { max-width: 100%; max-height: 100%; object-fit: contain; cursor: crosshair; }
  #reconnect-hint { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a1a1a; border: 1px solid #f1c40f; border-radius: 6px; padding: 10px 20px; color: #f1c40f; font-size: 13px; z-index: 100; white-space: nowrap; gap: 12px; align-items: center; }
  #reconnect-hint button { background: #f1c40f; color: #000; border: none; border-radius: 3px; padding: 4px 14px; cursor: pointer; font-weight: 600; font-size: 12px; }

  /* ── 桌面顶栏 ── */
  #bar { background: #1a1a1a; display: flex; align-items: center; padding: 4px 10px; border-bottom: 1px solid #333; font-size: 12px; gap: 8px; user-select: none; min-height: 36px; flex-shrink: 0; }
  #bar .sep { color: #444; }
  select, input[type=range] { background: #333; color: #fff; border: 1px solid #555; border-radius: 3px; padding: 2px 4px; }
  input[type=range] { width: 70px; accent-color: #f1c40f; padding: 0; }
  input[type=checkbox] { accent-color: #f1c40f; }
  label { cursor: pointer; }
  #stats { font-size: 12px; color: #4ec9b0; text-align: right; }
  #status-text { font-size: 12px; cursor: pointer; white-space: nowrap; }

  /* ── 手机 ── */
  @media (max-width: 900px) {
    #screen { cursor: default; }
    select, input[type=range], #bar .sep, #enable-control, #enable-control-label, #status-text, .desktop-only { display: none; }
    #bar { font-size: 11px; gap: 12px; align-items: center; background: rgba(26,26,26,0.92); backdrop-filter: blur(4px); flex-shrink: 0; }
    #main { display: flex; }
    #view { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .ctrl-btn {
      background: #333; color: #ccc; border: 1px solid #555; border-radius: 3px;
      padding: 4px 8px; font-size: 12px; cursor: pointer; white-space: nowrap;
    }
    .ctrl-btn.active { background: #f1c40f; color: #000; border-color: #f1c40f; }
    .ctrl-group { display: flex; gap: 3px; }
    #stats { font-size: 10px; color: #4ec9b0; text-align: center; }

    /* 竖屏：文字行 + 按钮行 */
    @media (orientation: portrait) {
      #main { flex-direction: column; }
      #bar { flex-direction: column; padding: 5px 10px; border-bottom: 1px solid #333; gap: 4px; }
      #stats { text-align: center; font-size: 11px; padding: 2px 0; }
      .ctrl-rows { width: 100%; display: flex; flex-direction: column; gap: 4px; }
      .ctrl-row { display: flex; align-items: center; justify-content: space-between; }
      .ctrl-btn { padding: 4px 10px; font-size: 12px; }
      .ctrl-group { display: flex; gap: 4px; }
    }
    /* 横屏：左侧栏，stats在上按钮在下 */
    @media (orientation: landscape) {
      #main { flex-direction: row; }
      #bar { flex-direction: column; padding: 8px 3px; width: 54px; border-right: 1px solid #333; align-items: center; }
      #stats { font-size: 9px; text-align: center; line-height: 1.4; padding: 4px 0; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.1); }
      .ctrl-rows { flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; width: 100%; padding: 6px 0; }
      .ctrl-row { height: 100%; display: flex; flex-direction: column; align-items: center; gap: 4px; justify-content: space-between; }
      .ctrl-group { display: flex; flex-direction: column; gap: 4px; }
      .ctrl-btn { padding: 5px 3px; font-size: 10px; text-align: center; min-width: 44px; }
    }
  }
</style>
</head>
<body>
<div id="main">
  <div id="bar">
    <!-- 桌面控件 -->
    <span class="desktop-only">屏幕</span><select id="screen-id"><option value="0">主屏</option></select>
    <span class="sep desktop-only">|</span><span class="desktop-only">画质</span><input type="range" id="quality" min="30" max="100" value="75" step="5"><span id="quality-val" class="desktop-only">75</span>
    <span class="sep desktop-only">|</span><span class="desktop-only">分辨率</span><select id="maxw"><option value="0">原始</option></select>
    <span class="sep desktop-only">|</span><input type="checkbox" id="enable-control"><label for="enable-control" class="desktop-only" id="enable-control-label">控制</label>
    <span class="sep desktop-only">|</span>
    <span id="stats">等待...</span>
    <span style="margin-left:auto;" class="desktop-only"><span id="user-name" style="color:#888;margin-right:8px;"></span><span id="status-text" style="color:#f1c40f;">连接中...</span></span>
  </div>
  <div id="view"><img id="screen" src="" alt="等待画面信号..."></div>
</div>
<div id="reconnect-hint"><span id="reconnect-msg"></span><button onclick="manualReconnect()">立即重连</button></div>

<script>
  const img = document.getElementById('screen'), select = document.getElementById('screen-id')
  const statusEl = document.getElementById('status-text'), controlCheck = document.getElementById('enable-control')
  const qualitySlider = document.getElementById('quality'), qualityVal = document.getElementById('quality-val')
  const maxwSelect = document.getElementById('maxw'), statsEl = document.getElementById('stats')
  const reconnectHint = document.getElementById('reconnect-hint'), reconnectMsg = document.getElementById('reconnect-msg')
  const bar = document.getElementById('bar')
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) && window.innerWidth <= 900

  let meta = { ox: 0, oy: 0, pw: 1, ph: 1, zoom: 1.0 }
  let serverAddr = window.location.host
  let ws = null, reconnectTimer = null, reconnectDelay = 5, reconnectCountdown = 0, wasConnected = false, lastResKey = ''
  let currentQ = 75, currentMW = 0, currentScreen = 0, screenCount = 1
  let mobileResOpts = []

  function send(o) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(o)) }
  function sendSettings() { send({ quality: currentQ, maxw: currentMW }) }

  function connect() {
    if (ws) { ws.onclose = null; ws.close(); ws = null }; clearReconnectTimer(); reconnectHint.style.display = 'none'; lastResKey = ''
    statusEl.textContent = '连接中...'; statusEl.style.color = '#f1c40f'
    ws = new WebSocket(`ws://${serverAddr}/ws`); ws.binaryType = 'arraybuffer'
    ws.onopen = () => { wasConnected = true; statusEl.textContent = '已连接'; statusEl.style.color = '#27ae60'; reconnectDelay = 5; sendSettings() }
    ws.onmessage = (event) => {
      if (typeof event.data === 'string') {
        try { const s = JSON.parse(event.data); if (s.user) { document.getElementById('user-name').textContent = s.user; statsEl.setAttribute('data-user', s.user); return }; if (s.owner !== undefined) { const me = statsEl.getAttribute('data-user') || ''; const isMe = s.owner === me; console.log('control sync', {owner: s.owner, me, isMe}); controlCheck.disabled = !isMe && s.owner !== ''; controlCheck.checked = isMe; controlCheck.parentElement.title = s.owner ? `控制权: ${s.owner}` : '点击获取控制权'; if (isMe) img.style.cursor = 'none'; else img.style.cursor = 'crosshair' }; if (isMobile) { const u = statsEl.getAttribute('data-user') || ''; const p = matchMedia('(orientation: portrait)').matches; statsEl.innerHTML = p ? `${u}&emsp;${s.fps}fps&emsp;&emsp;${s.kb}KB` : `${u}<br>${s.fps}fps<br>${s.kb}KB` } else { statsEl.innerHTML = `${s.w}×${s.h} Q${s.q} │ ${s.fps}fps │ ${s.enc_ms}ms │ ${s.kb}KB/f │ ${(s.kb*s.fps/1024).toFixed(1)}MB/s` }; if (s.screens > 0 && s.screens !== screenCount) { screenCount = s.screens; isMobile ? updateMobileUI() : updateDesktopScreens() } } catch (_) {}
        return
      }
      const buf = event.data, dv = new DataView(buf)
      meta = { ox: dv.getInt32(0, true), oy: dv.getInt32(4, true), pw: dv.getInt32(8, true), ph: dv.getInt32(12, true), zoom: dv.getFloat64(16, true) }
      if (isMobile) updateMobileResolutions(meta.pw, meta.ph)
      else { const key = `${meta.pw}x${meta.ph}`; if (key !== lastResKey) { lastResKey = key; buildDesktopResolutions(meta.pw, meta.ph) } }
      const jpg = new Uint8Array(buf, 24), blob = new Blob([jpg], { type: 'image/jpeg' }), url = URL.createObjectURL(blob)
      const old = img.src; img.src = url; if (old && old.startsWith('blob:')) URL.revokeObjectURL(old)
    }
    ws.onclose = () => { statusEl.textContent = '连接断开'; statusEl.style.color = '#e74c3c'; statsEl.innerHTML = '离线'; if (wasConnected) startReconnect() }
    ws.onerror = () => { if (!wasConnected) { statusEl.textContent = '连接失败'; statusEl.style.color = '#e74c3c' } }
  }
  connect()

  function startReconnect() { scheduleReconnect() }
  function scheduleReconnect() { clearReconnectTimer(); reconnectCountdown = reconnectDelay; updateReconnectUI(); reconnectHint.style.display = 'flex'; reconnectTimer = setInterval(() => { reconnectCountdown--; if (reconnectCountdown <= 0) { clearReconnectTimer(); reconnectHint.style.display = 'none'; reconnectDelay = Math.min(reconnectDelay * 2, 30); connect(); return }; updateReconnectUI() }, 1000) }
  function updateReconnectUI() { reconnectMsg.textContent = `${reconnectCountdown} 秒后自动重连...` }
  function manualReconnect() { clearReconnectTimer(); reconnectHint.style.display = 'none'; connect() }
  function clearReconnectTimer() { if (reconnectTimer) { clearInterval(reconnectTimer); reconnectTimer = null } }
  statusEl.onclick = () => { if (!ws || ws.readyState !== WebSocket.OPEN) { clearReconnectTimer(); reconnectHint.style.display = 'none'; connect() } }

  // ── 桌面端 ──
  if (!isMobile) {
    function updateDesktopScreens() {
      const cur = select.value; select.innerHTML = ''
      for (let i = 0; i < screenCount; i++) { const el = document.createElement('option'); el.value = i; el.textContent = i === 0 ? '主屏 (0)' : `副屏 (${i})`; select.appendChild(el) }
      select.value = cur < screenCount ? cur : '0'
    }
    function buildDesktopResolutions(pw, ph) {
      const opts = [{ label: `原始 (${pw}×${ph})`, value: 0 }]; for (const th of [1080, 720, 480]) { if (th >= ph) continue; opts.push({ label: `${Math.round(pw*th/ph)}×${th}`, value: Math.round(pw*th/ph) }) }
      const cur = maxwSelect.value; maxwSelect.innerHTML = ''; opts.forEach(o => { const el = document.createElement('option'); el.value = o.value; el.textContent = o.label; maxwSelect.appendChild(el) }); maxwSelect.value = opts.find(o => String(o.value) === cur) ? cur : '0'
    }
    qualitySlider.oninput = () => { qualityVal.textContent = qualitySlider.value }; qualitySlider.onchange = () => { currentQ = parseInt(qualitySlider.value); sendSettings() }
    maxwSelect.onchange = () => { currentMW = parseInt(maxwSelect.value); sendSettings() }
    select.onchange = () => { currentScreen = parseInt(select.value); send({ screen: currentScreen }); lastResKey = '' }
  }

  // ── 手机端 ──
  if (isMobile) {
    function updateMobileResolutions(pw, ph) {
      const maxW = Math.min(pw, Math.round(window.innerWidth * (window.devicePixelRatio || 1)))
      mobileResOpts = [{ label: `适配`, w: maxW }]
      for (const th of [720, 480]) { if (th >= ph) continue; const w = Math.round(pw * th / ph); mobileResOpts.push({ label: `${th}p`, w: w }) }
      // 去重
      mobileResOpts = mobileResOpts.filter((o, i) => mobileResOpts.findIndex(x => x.w === o.w) === i)
      if (!currentMW || !mobileResOpts.find(o => o.w === currentMW)) currentMW = mobileResOpts[0].w
      updateMobileUI()
    }
    function updateMobileUI() {
      bar.querySelectorAll('.ctrl-rows,.ctrl-row,.ctrl-btn,.ctrl-group').forEach(e => e.remove())
      // 按钮容器
      let rows = bar.querySelector('.ctrl-rows')
      if (!rows) { rows = document.createElement('div'); rows.className = 'ctrl-rows'; bar.appendChild(rows) }
      const row = () => { const d = document.createElement('div'); d.className = 'ctrl-row'; rows.appendChild(d); return d }
      const addBtn = (r, text, active, click) => { const b = document.createElement('span'); b.className = 'ctrl-btn' + (active ? ' active' : ''); b.textContent = text; b.onclick = click; r.appendChild(b) }
      const addGroup = (r, btns) => { const g = document.createElement('span'); g.className = 'ctrl-group'; btns.forEach(b => { const el = document.createElement('span'); el.className = 'ctrl-btn' + (b.active ? ' active' : ''); el.textContent = b.label; el.onclick = b.click; g.appendChild(el) }); r.appendChild(g) }

      const r = row()
      if (screenCount > 1) addBtn(r, `屏${currentScreen}`, false, () => { currentScreen = (currentScreen + 1) % screenCount; send({ screen: currentScreen }); updateMobileUI() })
      addGroup(r, [
        { label: '低', active: currentQ === 40, click: () => { currentQ = 40; sendSettings(); updateMobileUI() } },
        { label: '中', active: currentQ === 60, click: () => { currentQ = 60; sendSettings(); updateMobileUI() } },
        { label: '高', active: currentQ === 80, click: () => { currentQ = 80; sendSettings(); updateMobileUI() } },
      ])
      addGroup(r, mobileResOpts.map(o => ({ label: o.label, active: currentMW === o.w, click: () => { currentMW = o.w; sendSettings(); updateMobileUI() } })))
    }
    // 初始化默认值
    currentQ = 60; currentMW = 0
  }

  // ── 桌面控制功能 ──
  if (!isMobile) {
    controlCheck.onchange = () => { send({ control: controlCheck.checked }); img.style.cursor = controlCheck.checked ? 'none' : 'crosshair' }
    let active = false, dragStart = null, dragging = false
    img.onmousedown = (e) => { if (!controlCheck.checked || e.target !== img) return; e.preventDefault(); if (e.button === 0) { active = true; const c = screenCoords(e); if (c.fx == null) return; dragStart = c; dragging = false } }
    img.onmousemove = (e) => { if (!active || !dragStart) return; const c = screenCoords(e); if (c.fx == null) return; if (Math.abs(c.fx - dragStart.fx) > 3 || Math.abs(c.fy - dragStart.fy) > 3) dragging = true }
    img.onmouseup = (e) => { if (!active) return; active = false; e.preventDefault(); const c = screenCoords(e); if (c.fx == null) return; if (dragging) { send({ dx1: dragStart.fx, dy1: dragStart.fy, dx2: c.fx, dy2: c.fy }) } else { fetch(`http://${serverAddr}/click?x=${c.fx}&y=${c.fy}`).catch(() => {}) }; dragging = false; dragStart = null }
    view.addEventListener('contextmenu', (e) => { if (!controlCheck.checked || e.target !== img) return; e.preventDefault(); const c = screenCoords(e); if (c.fx == null) return; send({ rx: c.fx, ry: c.fy }) })
    const preventCodes = new Set(['F1','F3','F5','F11','F12','Tab','Escape','AltLeft','AltRight','ControlLeft','ControlRight','MetaLeft','MetaRight'])
    window.addEventListener('keydown', (e) => { if (!controlCheck.checked) return; if (preventCodes.has(e.code) || e.ctrlKey || e.altKey || e.metaKey) { e.preventDefault(); e.stopPropagation() }; send({ key: e.code, down: true }) }, { capture: true })
    window.addEventListener('keyup', (e) => { if (!controlCheck.checked) return; e.preventDefault(); e.stopPropagation(); send({ key: e.code, down: false }) }, { capture: true })
  }

  function eventPos(e) { const t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]); if (t) return { clientX: t.clientX, clientY: t.clientY, target: e.target }; return { clientX: e.clientX, clientY: e.clientY, target: e.target } }
  function screenCoords(e) { const p = eventPos(e), rect = img.getBoundingClientRect(), ratio = meta.pw / meta.ph, cRatio = rect.width / rect.height; let aw, ah, ox = 0, oy = 0; if (ratio > cRatio) { aw = rect.width; ah = rect.width / ratio; oy = (rect.height - ah) / 2 } else { ah = rect.height; aw = rect.height * ratio; ox = (rect.width - aw) / 2 }; const cx = (p.clientX - rect.left - ox) / aw, cy = (p.clientY - rect.top - oy) / ah; if (cx < 0 || cx > 1 || cy < 0 || cy > 1) return {}; return { fx: Math.round((meta.ox * meta.zoom) + (cx * meta.pw * meta.zoom)), fy: Math.round((meta.oy * meta.zoom) + (cy * meta.ph * meta.zoom)) } }
</script>
</body>
</html>
